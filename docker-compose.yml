version: "3.9"
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_PATH=/app/data/chroma_db
    command: bash start.sh

  ui:
    build: ./ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
