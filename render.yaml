services:
  - type: web
    name: rag-doc-qa-api
    runtime: python
    rootDir: api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TOP_K
        value: "5"
      - key: PYTHON_VERSION
        value: "3.11.9"
    healthCheckPath: /health
